<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" width="1200" height="150" fill="none" role="img" aria-label="Host nation shields: United States, Canada, Mexico">
  <defs>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <path id="shield" d="M-50,-50 L50,-50 L50,12 Q50,48 0,66 Q-50,48 -50,12 Z"/>
    <path id="star" d="M0,-9 2.12,-2.91 8.56,-2.78 3.42,1.11 5.29,7.28 0,3.6 -5.29,7.28 -3.42,1.11 -8.56,-2.78 -2.12,-2.91 Z"/>
  </defs>

  <!-- USA: blue field + white stars -->
  <g transform="translate(250 72) rotate(-3)" filter="url(#sh)">
    <use href="#shield" fill="#1d4ed8" stroke="#ffffff" stroke-width="2"/>
    <ellipse cx="0" cy="-30" rx="40" ry="13" fill="#ffffff" opacity="0.16"/>
    <g fill="#ffffff">
      <use href="#star" transform="translate(0 -26) scale(0.75)"/>
      <use href="#star" transform="translate(-22 -8) scale(0.7)"/>
      <use href="#star" transform="translate(22 -8) scale(0.7)"/>
      <use href="#star" transform="translate(-13 14) scale(0.6)"/>
      <use href="#star" transform="translate(13 14) scale(0.6)"/>
    </g>
    <animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -5;0 0" dur="3s" begin="0s" repeatCount="indefinite"/>
  </g>

  <!-- Canada: red field + white maple leaf -->
  <g transform="translate(600 72)" filter="url(#sh)">
    <use href="#shield" fill="#d52b1e" stroke="#ffffff" stroke-width="2"/>
    <ellipse cx="0" cy="-30" rx="40" ry="13" fill="#ffffff" opacity="0.16"/>
    <path transform="translate(0 -2) scale(0.72)" fill="#ffffff"
      d="M0,-40 6,-18 26,-28 18,-6 40,-3 27,7 36,27 13,20 11,40 0,30 -11,40 -13,20 -36,27 -27,7 -40,-3 -18,-6 -26,-28 -6,-18 Z"/>
    <animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -5;0 0" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </g>

  <!-- Mexico: green field + white eagle -->
  <g transform="translate(950 72) rotate(3)" filter="url(#sh)">
    <use href="#shield" fill="#0b6b3a" stroke="#ffffff" stroke-width="2"/>
    <ellipse cx="0" cy="-30" rx="40" ry="13" fill="#ffffff" opacity="0.16"/>
    <path transform="translate(0 -4) scale(0.82)" fill="#ffffff"
      d="M0,-14 C-6,-22 -18,-22 -20,-14 C-30,-16 -40,-8 -42,0 C-30,-6 -20,-2 -12,4 C-8,8 -4,12 0,20 C4,12 8,8 12,4 C20,-2 30,-6 42,0 C40,-8 30,-16 20,-14 C18,-22 6,-22 0,-14 Z"/>
    <rect x="-30" y="30" width="60" height="6" rx="3" fill="#d52b1e"/>
    <animateTransform attributeName="transform" additive="sum" type="translate" values="0 0;0 -5;0 0" dur="3s" begin="1.2s" repeatCount="indefinite"/>
  </g>
</svg>
